<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
body{
  background:#0f2027;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.board{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:10px;
  justify-content:center;
  margin-top:20px;
}

.cell{
  width:100px;
  height:100px;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1c3b4a;
  cursor:pointer;
  border-radius:10px;
}

button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🎮 Tic Tac Toe</h1>

<div class="board" id="board"></div>

<p id="status"></p>

<button onclick="resetGame()">Restart</button>

<script>

let board = Array(9).fill("");
let current = "X";
let gameOver = false;

const WIN = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

// Create board
function createBoard(){
  let b = document.getElementById("board");
  b.innerHTML="";
  for(let i=0;i<9;i++){
    let div=document.createElement("div");
    div.className="cell";
    div.onclick=()=>move(i);
    b.appendChild(div);
  }
}

function move(i){
  if(board[i] || gameOver) return;

  board[i]=current;
  render();

  let res=check();
  if(res){ end(res); return; }

  current="O";

  setTimeout(()=>{
    let ai=getAIMove();
    if(ai!=-1){
      board[ai]="O";
      render();
      let res=check();
      if(res){ end(res); return; }
      current="X";
    }
  },300);
}

function render(){
  document.querySelectorAll(".cell").forEach((c,i)=>{
    c.innerText=board[i];
  });
}

function check(){
  for(let l of WIN){
    if(board[l[0]] &&
       board[l[0]]==board[l[1]] &&
       board[l[1]]==board[l[2]]){
      return board[l[0]];
    }
  }
  if(board.every(x=>x)) return "draw";
  return null;
}

function end(res){
  gameOver=true;
  document.getElementById("status").innerText =
    res=="draw" ? "Draw 😐" : res+" Wins 🎉";
}

// 🔥 SMART AI (fork fix included)
function getFork(player){
  for(let i=0;i<9;i++){
    if(!board[i]){
      board[i]=player;
      let count=0;

      for(let l of WIN){
        let vals=l.map(x=>board[x]);
        if(vals.filter(v=>v==player).length==2 &&
           vals.includes("")){
          count++;
        }
      }

      board[i]="";
      if(count>=2) return i;
    }
  }
  return -1;
}

function findMove(player){
  for(let l of WIN){
    let vals=l.map(x=>board[x]);
    if(vals.filter(v=>v==player).length==2 &&
       vals.includes("")){
      return l[vals.indexOf("")];
    }
  }
  return -1;
}

function getAIMove(){

  // win
  let m=findMove("O");
  if(m!=-1) return m;

  // block
  m=findMove("X");
  if(m!=-1) return m;

  // fork
  m=getFork("O");
  if(m!=-1) return m;

  // block fork
  m=getFork("X");
  if(m!=-1){
    let sides=[1,3,5,7].filter(i=>!board[i]);
    if(sides.length) return sides[0];
    return m;
  }

  // center
  if(!board[4]) return 4;

  // corner
  let corners=[0,2,6,8].filter(i=>!board[i]);
  if(corners.length) return corners[0];

  // side
  let sides=[1,3,5,7].filter(i=>!board[i]);
  if(sides.length) return sides[0];

  return -1;
}

function resetGame(){
  board=Array(9).fill("");
  current="X";
  gameOver=false;
  createBoard();
  document.getElementById("status").innerText="";
}

createBoard();

</script>

</body>
</html>
