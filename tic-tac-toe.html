<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe | Rock Tools</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
  background:#f4f6f8;
}

.game-wrap{
  max-width:440px;
  margin:24px auto;
  padding:0 16px 60px;
  text-align:center;
}

.game-title{
  color:#00c6ff;
  font-size:1.6rem;
  margin-bottom:10px;
}

/* MODE BUTTON */
.mode-wrap{
  display:flex;
  gap:10px;
  margin:14px 0;
}

.mode-btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:2px solid #00c6ff;
  background:#ffffff;
  color:#00c6ff;
  cursor:pointer;
  font-weight:600;
}

.mode-btn.active{
  background:#00c6ff;
  color:#fff;
}

/* BOARD */
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  max-width:320px;
  margin:20px auto;
}

/* 🔥 FIXED CELL DESIGN */
.cell{
  aspect-ratio:1;
  background:#ffffff;
  border:2px solid #00c6ff;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:52px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  transition:0.2s;
}

.cell:hover{
  transform:scale(1.05);
}

.mark-x{
  color:#00ffd5;
  font-weight:bold;
}

.mark-o{
  color:#ff6b6b;
  font-weight:bold;
}

#statusMsg{
  font-size:18px;
  margin:10px 0;
}

/* BUTTON */
button{
  padding:10px 16px;
  border:none;
  background:#00c6ff;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="game-wrap">

<h1 class="game-title">⭕ Tic Tac Toe</h1>

<div class="mode-wrap">
<button class="mode-btn active" onclick="setMode('ai')">🤖 vs Computer</button>
<button class="mode-btn" onclick="setMode('2p')">👥 vs Friend</button>
</div>

<div class="board" id="board"></div>

<p id="statusMsg"></p>

<button onclick="resetBoard()">Restart</button>

</div>

<script>

var WIN_LINES=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

var board = Array(9).fill(null);
var current = 'X';
var isOver = false;
var mode = 'ai';

// BUILD
function buildBoard(){
let el=document.getElementById('board');
el.innerHTML='';
for(let i=0;i<9;i++){
let c=document.createElement('div');
c.className='cell';
c.dataset.i=i;
c.onclick=handleClick;
el.appendChild(c);
}
}

// CLICK
function handleClick(e){
let i=e.target.dataset.i;
if(board[i]||isOver) return;
if(mode==='ai'&&current==='O') return;
makeMove(i);
}

// MOVE
function makeMove(i){
board[i]=current;
render();

let res=check();
if(res){end(res);return;}

current=current==='X'?'O':'X';

if(mode==='ai'&&current==='O'){
setTimeout(()=>{
let m=getAIMove();
if(m!==-1) makeMove(m);
},300);
}
}

// RENDER
function render(){
document.querySelectorAll('.cell').forEach((c,i)=>{
c.innerHTML='';
if(board[i]=='X') c.innerHTML='<span class="mark-x">X</span>';
if(board[i]=='O') c.innerHTML='<span class="mark-o">O</span>';
});
}

// RESULT
function check(){
for(let l of WIN_LINES){
if(board[l[0]]&&board[l[0]]==board[l[1]]&&board[l[1]]==board[l[2]])
return board[l[0]];
}
if(board.every(v=>v)) return 'draw';
return null;
}

// END
function end(res){
isOver=true;
document.getElementById('statusMsg').innerText=
res==='draw'?'Draw!':res+' Wins!';
}

// RESET
function resetBoard(){
board=Array(9).fill(null);
current='X';
isOver=false;
buildBoard();
render();
}

// MODE
function setMode(m){
mode=m;
resetBoard();
}

// 🔥 SMART AI
function getAIMove(){

// win
let m=findMove('O');
if(m!=-1) return m;

// block
m=findMove('X');
if(m!=-1) return m;

// fork create
m=findFork('O');
if(m!=-1) return m;

// fork block
m=findFork('X');
if(m!=-1){
let sides=[1,3,5,7].filter(i=>!board[i]);
if(sides.length) return sides[0];
return m;
}

// center
if(!board[4]) return 4;

// opposite corner
let opp=[[0,8],[2,6],[6,2],[8,0]];
for(let o of opp){
if(board[o[0]]=='X'&&!board[o[1]]) return o[1];
}

// corner
let c=[0,2,6,8].filter(i=>!board[i]);
if(c.length) return c[Math.floor(Math.random()*c.length)];

// side
let s=[1,3,5,7].filter(i=>!board[i]);
if(s.length) return s[Math.floor(Math.random()*s.length)];

return -1;
}

// FIND MOVE
function findMove(p){
for(let l of WIN_LINES){
let v=l.map(i=>board[i]);
if(v.filter(x=>x==p).length==2 && v.includes(null))
return l[v.indexOf(null)];
}
return -1;
}

// 🔥 FORK FIX
function findFork(p){
for(let i=0;i<9;i++){
if(!board[i]){
board[i]=p;
let count=0;

for(let l of WIN_LINES){
let v=l.map(x=>board[x]);
if(v.filter(x=>x==p).length==2 && v.includes(null)) count++;
}

board[i]=null;
if(count>=2) return i;
}
}
return -1;
}

// INIT
buildBoard();

</script>

</body>
</html>
