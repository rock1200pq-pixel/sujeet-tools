<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
body{font-family:sans-serif;text-align:center;background:#111;color:#fff}
.board{display:grid;grid-template-columns:repeat(3,100px);gap:10px;justify-content:center;margin-top:20px}
.cell{width:100px;height:100px;font-size:40px;display:flex;align-items:center;justify-content:center;background:#222;border:2px solid #0ff;cursor:pointer}
</style>

</head>
<body>

<h1>⭕ Tic Tac Toe</h1>

<div class="board" id="board"></div>
<p id="status"></p>
<button onclick="resetGame()">Restart</button>

<script>

// =========================
// GAME LOGIC
// =========================

var WIN_LINES=[
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

var board=Array(9).fill(null);
var current='X';
var isOver=false;

// =========================
// BUILD BOARD
// =========================
function buildBoard(){
var el=document.getElementById('board');
el.innerHTML='';
for(var i=0;i<9;i++){
var c=document.createElement('div');
c.className='cell';
c.dataset.i=i;
c.onclick=handleClick;
el.appendChild(c);
}
}

// =========================
// CLICK
// =========================
function handleClick(e){
var i=parseInt(e.target.dataset.i);
if(board[i]||isOver) return;

makeMove(i);

if(!isOver){
setTimeout(()=>{
var ai=getAIMove();
if(ai!==-1) makeMove(ai);
},300);
}
}

// =========================
// MOVE
// =========================
function makeMove(i){
board[i]=current;
render();

var res=check();
if(res){
endGame(res);
return;
}

current=current==='X'?'O':'X';
}

// =========================
// RENDER
// =========================
function render(){
var cells=document.querySelectorAll('.cell');
cells.forEach((c,i)=>{
c.innerText=board[i]||'';
});
}

// =========================
// CHECK WIN
// =========================
function check(){
for(var l of WIN_LINES){
if(board[l[0]]&&board[l[0]]===board[l[1]]&&board[l[0]]===board[l[2]]){
return board[l[0]];
}
}
if(board.every(x=>x)) return 'draw';
return null;
}

// =========================
// END
// =========================
function endGame(res){
isOver=true;
if(res==='draw'){
document.getElementById('status').innerText="Draw!";
}else{
document.getElementById('status').innerText=res+" Wins!";
}
}

// =========================
// RESET
// =========================
function resetGame(){
board=Array(9).fill(null);
current='X';
isOver=false;
document.getElementById('status').innerText="";
buildBoard();
}

// =========================
// AI LOGIC (SMART)
// =========================

function getAIMove(){

// 1 WIN
var m=findMove('O'); if(m!==-1) return m;

// 2 BLOCK
m=findMove('X'); if(m!==-1) return m;

// 3 FORK CREATE
m=findFork('O'); if(m!==-1) return m;

// 4 FORK BLOCK
m=findFork('X');
if(m!==-1){
var sides=[1,3,5,7].filter(i=>!board[i]);
if(sides.length) return sides[Math.floor(Math.random()*sides.length)];
return m;
}

// 5 CENTER
if(!board[4]) return 4;

// 6 OPPOSITE CORNER
var opp=[[0,8],[2,6],[6,2],[8,0]];
for(var o of opp){
if(board[o[0]]==='X' && !board[o[1]]) return o[1];
}

// 7 CORNER
var corners=[0,2,6,8].filter(i=>!board[i]);
if(corners.length) return corners[Math.floor(Math.random()*corners.length)];

// 8 SIDE
var sides=[1,3,5,7].filter(i=>!board[i]);
if(sides.length) return sides[Math.floor(Math.random()*sides.length)];

return -1;
}

// =========================
// HELPERS
// =========================

function findMove(p){
for(var l of WIN_LINES){
var vals=l.map(i=>board[i]);
if(vals.filter(v=>v===p).length===2 && vals.includes(null)){
return l[vals.indexOf(null)];
}
}
return -1;
}

function findFork(p){
for(var i=0;i<9;i++){
if(!board[i]){
board[i]=p;

var count=0;
for(var l of WIN_LINES){
var vals=l.map(x=>board[x]);
if(vals.filter(v=>v===p).length===2 && vals.includes(null)){
count++;
}
}

board[i]=null;

if(count>=2) return i;
}
}
return -1;
}

// INIT
buildBoard();

</script>

</body>
</html>
