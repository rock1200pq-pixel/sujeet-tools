<div class="container">

<h2>📄 PDF Tools</h2>

<div class="features">

<div class="card">
<h3>Merge PDF</h3>
<input type="file" id="mergeFiles" multiple>
<button onclick="mergePDFs()">Merge</button>
</div>

<div class="card">
<h3>Split PDF</h3>
<input type="file">
<button>Coming Soon</button>
</div>

<div class="card">
<h3>Compress PDF</h3>
<input type="file">
<button>Coming Soon</button>
</div>

<div class="card">
<h3>PDF to Word</h3>
<input type="file" id="pdfToWordFile">
<button onclick="convertPDFToWord()">Extract Text</button>
</div>

</div>


<h2>🖼 Image Tools</h2>

<div class="features">

<div class="card">
<h3>Image to PDF</h3>
<input type="file" id="imageFiles" multiple>
<button onclick="convertImageToPDF()">Convert</button>
</div>

<div class="card">
<h3>JPG to PNG</h3>
<input type="file" id="jpgInput">
<button onclick="jpgToPng()">Convert</button>
</div>

<div class="card">
<h3>Resize Image</h3>
<input type="file" id="resizeInput">
<button onclick="resizeImage()">Resize</button>
</div>

</div>


<h2>⚙ Utility Tools</h2>

<div class="features">

<div class="card">
<h3>QR Generator</h3>
<input id="qrText">
<button onclick="generateQR()">Generate</button>
<div id="qr"></div>
</div>

<div class="card">
<h3>Password Generator</h3>
<button onclick="generatePassword()">Generate</button>
<p id="password"></p>
</div>

<div class="card">
<h3>Text Counter</h3>
<textarea id="textInput"></textarea>
<button onclick="countText()">Count</button>
<p id="textResult"></p>
</div>

</div>

</div>
