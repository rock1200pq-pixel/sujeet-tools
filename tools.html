<h1 class="title">All Tools</h1>

<div class="toolsGrid">

<div class="toolCard">

<h3>Merge PDF</h3>

<input type="file" multiple id="merge">

<button onclick="mergePDF()">Merge</button>

</div>

<div class="toolCard">

<h3>Split PDF</h3>

<input type="file" id="split">

<button onclick="splitPDF()">Split</button>

</div>

<div class="toolCard">

<h3>Image Compress</h3>

<input type="file" id="compress">

<button onclick="compressImage()">Compress</button>

</div>

<div class="toolCard">

<h3>Image to PDF</h3>

<input type="file" multiple id="imgpdf">

<button onclick="imageToPDF()">Convert</button>

</div>

<div class="toolCard">

<h3>JPG to PNG</h3>

<input type="file" id="jpg">

<button onclick="jpgToPNG()">Convert</button>

</div>

<div class="toolCard">

<h3>QR Generator</h3>

<input type="text" id="qrtext">

<button onclick="generateQR()">Generate</button>

<div id="qr"></div>

</div>

<div class="toolCard">

<h3>Image Text → Excel</h3>

<input type="file" id="ocr">

<button onclick="extractText()">Extract</button>

</div>
<div class="toolCard">

<h3>PDF to JPG</h3>
<input type="file" id="pdfToJpgFile">
<button onclick="pdfToJpg()">Convert</button>

</div>

<div class="toolCard">

<h3>PNG to JPG</h3>
<input type="file" id="pngFile">
<button onclick="pngToJpg()">Convert</button>

</div>

<div class="toolCard">

<h3>Resize Image</h3>
<input type="file" id="resizeImage">
<input type="number" id="resizeWidth" placeholder="Width">
<input type="number" id="resizeHeight" placeholder="Height">
<button onclick="resizeImage()">Resize</button>

</div>

<div class="toolCard">

<h3>Password Generator</h3>
<button onclick="generatePassword()">Generate</button>
<p id="passwordResult"></p>

</div>
<div class="toolCard">

<h3>Image Table → Excel</h3>

<input type="file" id="tableImage">

<button onclick="tableToExcel()">Convert</button>

<p id="tableResult"></p>

</div>
</div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</body>

</html>
