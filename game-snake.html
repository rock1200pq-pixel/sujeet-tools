<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Ultra Pro</title>
<style>
body { background:#050d05; color:#0f0; text-align:center; font-family:sans-serif; }
canvas { background:#0d1f0d; margin-top:20px; border-radius:12px; }
button { padding:10px 20px; margin-top:10px; cursor:pointer; }
</style>
</head>
<body>

<h2>🐍 Snake Ultra</h2>
<p>Arrow keys | Space = Pause</p>
<canvas id="game" width="400" height="400"></canvas><br>
<button onclick="startGame()">Start / Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRID=20, COLS=20;
let snake, dir, nextDir, food, score, best;
let speed, loop, paused=false;
let foodType="normal", obstacles=[], shield=false;

// Smooth wave
const AMP=6, FREQ=0.6;

// Load best
best = localStorage.getItem("snakeBest") || 0;

// START
function startGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; speed=140; paused=false; shield=false;

  spawnObstacles();
  spawnFood();

  clearInterval(loop);
  loop=setInterval(update,speed);
  draw();
}

// SAFE FOOD
function spawnFood(){
  let ok=false;
  while(!ok){
    food={x:rand(),y:rand()};
    ok=!snake.some(s=>same(s,food)) &&
       !obstacles.some(o=>same(o,food));
  }

  let r=Math.random();
  foodType = r<0.7?"normal":r<0.85?"bonus":r<0.95?"speed":"shield";
}

// SAFE OBSTACLES
function spawnObstacles(){
  obstacles=[];
  for(let i=0;i<5;i++){
    let p;
    do{ p={x:rand(),y:rand()} }
    while(snake && snake.some(s=>same(s,p)));
    obstacles.push(p);
  }
}

function rand(){ return Math.floor(Math.random()*COLS); }
function same(a,b){ return a.x===b.x && a.y===b.y; }

// UPDATE
function update(){
  if(paused) return;

  dir=nextDir;
  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // wrap
  if(head.x<0) head.x=COLS-1;
  if(head.y<0) head.y=COLS-1;
  if(head.x>=COLS) head.x=0;
  if(head.y>=COLS) head.y=0;

  // collision
  if(!shield && (
    snake.some(s=>same(s,head)) ||
    obstacles.some(o=>same(o,head))
  )) return gameOver();

  snake.unshift(head);

  // eat
  if(same(head,food)){
    if(foodType==="normal") score++;
    if(foodType==="bonus") score+=5;

    if(foodType==="speed"){
      let old=speed;
      speed=Math.max(60,speed-40);
      reset();
      setTimeout(()=>{speed=old;reset();},3000);
    }

    if(foodType==="shield"){
      shield=true;
      setTimeout(()=>shield=false,3000);
    }

    spawnFood();
  } else snake.pop();

  // difficulty
  if(score && score%5===0){
    speed=Math.max(60,speed-3);
    reset();
  }

  draw();
}

function reset(){
  clearInterval(loop);
  loop=setInterval(update,speed);
}

// DRAW
function draw(){
  ctx.fillStyle="#0d1f0d";
  ctx.fillRect(0,0,400,400);

  // snake (smooth wave effect)
  snake.forEach((s,i)=>{
    let offset = Math.sin(i*FREQ + Date.now()/200)*AMP;
    let px = s.x*GRID + (dir.y*offset);
    let py = s.y*GRID + (-dir.x*offset);

    ctx.fillStyle = shield?"cyan":"lime";
    ctx.fillRect(px,py,GRID,GRID);
  });

  // food
  let colors={
    normal:"red",
    bonus:"gold",
    speed:"cyan",
    shield:"white"
  };
  ctx.fillStyle=colors[foodType];
  ctx.fillRect(food.x*GRID,food.y*GRID,GRID,GRID);

  // obstacles
  ctx.fillStyle="gray";
  obstacles.forEach(o=>{
    ctx.fillRect(o.x*GRID,o.y*GRID,GRID,GRID);
  });

  // UI
  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,10,20);
  ctx.fillText("Best: "+best,10,40);

  if(paused){
    ctx.fillStyle="yellow";
    ctx.fillText("PAUSED",160,200);
  }
}

// GAME OVER
function gameOver(){
  clearInterval(loop);

  if(score>best){
    best=score;
    localStorage.setItem("snakeBest",best);
  }

  alert("Game Over! Score: "+score);
}

// CONTROLS
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp" && dir.y!==1) nextDir={x:0,y:-1};
  if(e.key==="ArrowDown" && dir.y!==-1) nextDir={x:0,y:1};
  if(e.key==="ArrowLeft" && dir.x!==1) nextDir={x:-1,y:0};
  if(e.key==="ArrowRight" && dir.x!==-1) nextDir={x:1,y:0};

  if(e.key===" "){
    paused=!paused;
    draw();
  }
});

// INIT
draw();
</script>

</body>
</html>
