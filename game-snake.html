<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game | Rock Tools</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-wrap {
      max-width: 480px;
      margin: 30px auto;
      padding: 0 16px 60px;
      text-align: center;
    }
    .game-title {
      font-family: 'Orbitron', sans-serif;
      color: #00c6ff;
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    .game-subtitle {
      color: #555;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 12px 0;
    }
    .score-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,198,255,0.2);
      border-radius: 10px;
      padding: 6px 22px;
    }
    .score-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .score-val   { font-size: 22px; font-weight: 700; color: #00c6ff; }
    .canvas-wrap {
      display: inline-block;
      border: 1.5px dashed rgba(0,198,255,0.18);
      border-radius: 10px;
      padding: 4px;
      background: #040d15;
    }
    canvas {
      display: block;
      border-radius: 7px;
      background: #040d15;
    }
    .game-btn {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border: none; border-radius: 10px;
      color: #000; font-weight: 700; font-size: 14px;
      padding: 11px 32px; cursor: pointer; margin-top: 14px;
      font-family: 'Exo 2', sans-serif;
    }
    .game-btn:hover { opacity: 0.85; }
    .status-msg {
      margin: 10px 0 2px;
      font-size: 13px; color: #4ade80; min-height: 20px;
    }
    .nokia-hint { font-size: 11px; color: #444; margin-bottom: 2px; }
    .dpad { display: none; flex-direction: column; align-items: center; gap: 6px; margin-top: 14px; }
    .dpad-row { display: flex; gap: 6px; }
    .dpad-btn {
      width: 58px; height: 58px;
      background: rgba(0,198,255,0.07);
      border: 1px solid rgba(0,198,255,0.22);
      border-radius: 12px; color: #00c6ff; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .dpad-btn:active { background: rgba(0,198,255,0.2); }
    @media (max-width: 500px) {
      canvas { width: 300px !important; height: 300px !important; }
      .dpad  { display: flex; }
    }
    .back-link {
      display: inline-block; margin-top: 18px;
      color: #555; font-size: 13px; text-decoration: none;
    }
    .back-link:hover { color: #00c6ff; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Rock Tools Logo">
      <span class="logo-text">ROCK TOOLS</span>
    </a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="tools.html">Tools</a></li>
      <li><a href="games.html" class="active">Games</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="game-wrap">
    <h1 class="game-title">🐍 Snake</h1>
    <p class="game-subtitle">Nokia 1200 style — boundary paar karo aur doosri taraf niklo!</p>

    <div class="score-bar">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-val" id="best">0</div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="status-msg" id="statusMsg">▶ Start dabao aur khelo!</div>
    <p class="nokia-hint">Game over sirf tab — jab snake apne body se takraye</p>
    <button class="game-btn" id="startBtn" onclick="startGame()">▶ Start Game</button>

    <div class="dpad" id="dpad">
      <div class="dpad-row"><div class="dpad-btn" onclick="setDir(0,-1)">▲</div></div>
      <div class="dpad-row">
        <div class="dpad-btn" onclick="setDir(-1,0)">◀</div>
        <div class="dpad-btn" onclick="setDir(0,1)">▼</div>
        <div class="dpad-btn" onclick="setDir(1,0)">▶</div>
      </div>
    </div>

    <a href="games.html" class="back-link">← Back to Games</a>
  </div>

<script>
var canvas = document.getElementById('gameCanvas');
var ctx    = canvas.getContext('2d');
var GRID   = 20;
var COLS   = canvas.width  / GRID;
var ROWS   = canvas.height / GRID;

var snake, dir, nextDir, food, score, bestScore, gameLoop;
bestScore = 0;

function startGame() {
  snake = [
    {x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}
  ];
  dir     = {x:1,y:0};
  nextDir = {x:1,y:0};
  score   = 0;
  updateScore();
  spawnFood();
  document.getElementById('startBtn').innerText    = '🔄 Restart';
  document.getElementById('statusMsg').innerText   = '🎮 Nokia mode ON!';
  document.getElementById('statusMsg').style.color = '#4ade80';
  if (window.innerWidth <= 500) document.getElementById('dpad').style.display = 'flex';
  clearInterval(gameLoop);
  gameLoop = setInterval(step, 140);
}

function spawnFood() {
  var p;
  do {
    p = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(function(s){return s.x===p.x&&s.y===p.y;}));
  food = p;
}

function setDir(dx, dy) {
  if (dx===-dir.x && dy===-dir.y) return;
  nextDir = {x:dx, y:dy};
}

function step() {
  dir = nextDir;
  var head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // ── NOKIA WRAP ──
  if (head.x < 0)     head.x = COLS - 1;
  if (head.x >= COLS) head.x = 0;
  if (head.y < 0)     head.y = ROWS - 1;
  if (head.y >= ROWS) head.y = 0;

  // ── Game over ONLY on self hit ──
  for (var i = 0; i < snake.length - 1; i++) {
    if (head.x === snake[i].x && head.y === snake[i].y) {
      doGameOver(); return;
    }
  }

  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    updateScore();
    spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

// ════ DRAW ════
function draw() {
  // BG
  ctx.fillStyle = '#040d15';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(0,198,255,0.03)';
  ctx.lineWidth   = 0.5;
  for(var x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*GRID,0);ctx.lineTo(x*GRID,canvas.height);ctx.stroke();}
  for(var y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*GRID);ctx.lineTo(canvas.width,y*GRID);ctx.stroke();}

  drawFood();

  // Body segments (tail to neck)
  for (var i = snake.length-1; i >= 1; i--) {
    drawSegment(snake[i], i);
  }
  // Head last (on top)
  drawHead(snake[0]);
}

// ── Apple food ──
function drawFood() {
  var cx = food.x*GRID + GRID/2;
  var cy = food.y*GRID + GRID/2;
  var r  = GRID/2 - 2;
  // Body
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#e63946';
  ctx.fill();
  // Shine
  ctx.beginPath();
  ctx.arc(cx - r*0.3, cy - r*0.35, r*0.28, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.fill();
  // Stem
  ctx.strokeStyle = '#5a3e28';
  ctx.lineWidth   = 1.5;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, cy-r);
  ctx.quadraticCurveTo(cx+5, cy-r-7, cx+3, cy-r-6);
  ctx.stroke();
  // Leaf
  ctx.fillStyle = '#2d9e5f';
  ctx.beginPath();
  ctx.ellipse(cx+4, cy-r-4, 4, 2, Math.PI/4, 0, Math.PI*2);
  ctx.fill();
}

// ── Body segment — green scaly block ──
function drawSegment(seg, idx) {
  var t = idx / snake.length;
  // Green gradient from bright to dark toward tail
  var g = Math.round(180 - t * 80);
  var color = 'rgb(80,' + g + ',30)';
  var x = seg.x*GRID + 2;
  var y = seg.y*GRID + 2;
  var w = GRID-4;
  var h = GRID-4;
  // Main block
  ctx.fillStyle = color;
  rRect(x, y, w, h, 5);
  ctx.fill();
  // Scale detail
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth   = 0.8;
  rRect(x+1, y+1, w-2, h-2, 4);
  ctx.stroke();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  rRect(x+1, y+1, w-2, (h-2)/2, 3);
  ctx.fill();
}

// ── Realistic snake head ──
function drawHead(seg) {
  var cx = seg.x*GRID + GRID/2;
  var cy = seg.y*GRID + GRID/2;

  ctx.save();
  ctx.translate(cx, cy);

  var angle = 0;
  if (dir.x===1)  angle = 0;
  if (dir.x===-1) angle = Math.PI;
  if (dir.y===-1) angle = -Math.PI/2;
  if (dir.y===1)  angle = Math.PI/2;
  ctx.rotate(angle);

  var r = GRID/2 - 1;

  // Head oval — brighter green
  ctx.beginPath();
  ctx.ellipse(1, 0, r+1, r-1, 0, 0, Math.PI*2);
  ctx.fillStyle = '#7dc740';
  ctx.fill();
  ctx.strokeStyle = '#5a9e28';
  ctx.lineWidth   = 1;
  ctx.stroke();

  // Top shine
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.ellipse(0, -2, r-3, (r-3)*0.4, 0, 0, Math.PI*2);
  ctx.fill();

  // Nostrils
  ctx.fillStyle = '#3a6e18';
  ctx.beginPath();
  ctx.arc(r-1,  3, 1.5, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r-1, -3, 1.5, 0, Math.PI*2);
  ctx.fill();

  // Eyes — white + pupil
  drawEye(3,  -(r-4));
  drawEye(3,   r-4);

  // Tongue — forked red
  ctx.strokeStyle = '#e63946';
  ctx.lineWidth   = 1.5;
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(r, 0); ctx.lineTo(r+5, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r+5,0); ctx.lineTo(r+8,-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r+5,0); ctx.lineTo(r+8, 3); ctx.stroke();

  ctx.restore();
}

function drawEye(ex, ey) {
  // White
  ctx.beginPath();
  ctx.arc(ex, ey, 3, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  // Pupil
  ctx.beginPath();
  ctx.arc(ex+0.8, ey, 1.5, 0, Math.PI*2);
  ctx.fillStyle = '#111111';
  ctx.fill();
  // Shine
  ctx.beginPath();
  ctx.arc(ex+0.2, ey-1, 0.6, 0, Math.PI*2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
}

// ── Rounded rect helper ──
function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function doGameOver() {
  clearInterval(gameLoop);
  if (score > bestScore) { bestScore = score; document.getElementById('best').innerText = bestScore; }
  document.getElementById('statusMsg').innerText   = '💀 Game Over! Score: ' + score;
  document.getElementById('statusMsg').style.color = '#ff6b6b';
  document.getElementById('startBtn').innerText    = '🔄 Play Again';
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#ff6b6b';
  ctx.font      = 'bold 26px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 14);
  ctx.fillStyle = '#fff';
  ctx.font      = '15px Exo 2, sans-serif';
  ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 16);
}

function updateScore() {
  document.getElementById('score').innerText = score;
  if (score > bestScore) { bestScore = score; document.getElementById('best').innerText = bestScore; }
}

// Idle screen
(function(){
  ctx.fillStyle = '#040d15';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(0,198,255,0.55)';
  ctx.font = 'bold 20px Orbitron, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SNAKE', canvas.width/2, canvas.height/2 - 12);
  ctx.fillStyle = '#444';
  ctx.font = '13px Exo 2, sans-serif';
  ctx.fillText('Nokia style — wrap around!', canvas.width/2, canvas.height/2 + 16);
})();

// Keyboard
document.addEventListener('keydown', function(e) {
  switch(e.key) {
    case 'ArrowUp':    case 'w': case 'W': setDir( 0,-1); e.preventDefault(); break;
    case 'ArrowDown':  case 's': case 'S': setDir( 0, 1); e.preventDefault(); break;
    case 'ArrowLeft':  case 'a': case 'A': setDir(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': setDir( 1, 0); e.preventDefault(); break;
  }
});

// Touch swipe
var tx=0, ty=0;
canvas.addEventListener('touchstart', function(e){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend',   function(e){
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});
</script>
</body>
</html>
