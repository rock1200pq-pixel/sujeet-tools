<!DOCTYPE html>
<!-- Rock Tools | game-snake.html | Updated: 22 March 2026 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game | Rock Tools</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-wrap {
      max-width: 480px;
      margin: 30px auto;
      padding: 0 16px 60px;
      text-align: center;
    }
    .game-title {
      font-family: 'Orbitron', sans-serif;
      color: #00c6ff;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 14px 0;
    }
    .score-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,198,255,0.2);
      border-radius: 10px;
      padding: 8px 24px;
    }
    .score-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .score-val { font-size: 24px; font-weight: 700; color: #00c6ff; }
    canvas {
      border: 2px solid rgba(0,198,255,0.3);
      border-radius: 12px;
      display: block;
      margin: 0 auto;
      background: #050f1a;
    }
    .game-btn {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 36px;
      cursor: pointer;
      margin-top: 16px;
      font-family: 'Exo 2', sans-serif;
    }
    .game-btn:hover { opacity: 0.85; }
    .status-msg {
      margin: 12px 0 0;
      font-size: 14px;
      color: #4ade80;
      min-height: 20px;
    }
    /* Mobile controls */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 16px;
    }
    .dpad-row { display: flex; gap: 4px; }
    .dpad-btn {
      width: 56px; height: 56px;
      background: rgba(0,198,255,0.1);
      border: 1px solid rgba(0,198,255,0.3);
      border-radius: 10px;
      color: #00c6ff;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .dpad-btn:active { background: rgba(0,198,255,0.25); }
    @media (max-width: 500px) {
      canvas { width: 320px !important; height: 320px !important; }
      .dpad { display: flex; }
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #888;
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover { color: #00c6ff; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Rock Tools Logo">
      <span class="logo-text">ROCK TOOLS</span>
    </a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="tools.html">Tools</a></li>
      <li><a href="games.html" class="active">Games</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="game-wrap">
    <h1 class="game-title">🐍 Snake</h1>
    <p style="color:#888;font-size:13px;margin-bottom:10px;">Arrow keys ya WASD se khelo</p>

    <div class="score-bar">
      <div class="score-box">
        <div class="score-label">Score</div>
        <div class="score-val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">Best</div>
        <div class="score-val" id="best">0</div>
      </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="status-msg" id="statusMsg">▶ Start dabao aur khelo!</div>
    <button class="game-btn" id="startBtn" onclick="startGame()">▶ Start Game</button>

    <!-- Mobile D-Pad -->
    <div class="dpad" id="dpad">
      <div class="dpad-row">
        <div class="dpad-btn" onclick="setDir(0,-1)">▲</div>
      </div>
      <div class="dpad-row">
        <div class="dpad-btn" onclick="setDir(-1,0)">◀</div>
        <div class="dpad-btn" onclick="setDir(0,1)">▼</div>
        <div class="dpad-btn" onclick="setDir(1,0)">▶</div>
      </div>
    </div>

    <a href="games.html" class="back-link">← Back to Games</a>
  </div>

<script>
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var GRID = 20;
  var COLS = canvas.width / GRID;   // 20
  var ROWS = canvas.height / GRID;  // 20

  var snake, dir, nextDir, food, score, bestScore, gameLoop, running;
  bestScore = 0;

  function startGame() {
    // Init snake — middle of canvas
    snake = [
      { x: 10, y: 10 },
      { x: 9,  y: 10 },
      { x: 8,  y: 10 }
    ];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    running = true;

    updateScore();
    spawnFood();

    document.getElementById('startBtn').innerText  = '🔄 Restart';
    document.getElementById('statusMsg').innerText = '🎮 Khel raha hai...';
    document.getElementById('statusMsg').style.color = '#4ade80';

    // Show dpad on mobile
    if (window.innerWidth <= 500) {
      document.getElementById('dpad').style.display = 'flex';
    }

    clearInterval(gameLoop);
    gameLoop = setInterval(step, 150);
  }

  function spawnFood() {
    var pos;
    do {
      pos = {
        x: Math.floor(Math.random() * COLS),
        y: Math.floor(Math.random() * ROWS)
      };
    } while (snake.some(function(s) { return s.x === pos.x && s.y === pos.y; }));
    food = pos;
  }

  function setDir(dx, dy) {
    // Prevent 180 degree reverse
    if (dx === -dir.x && dy === -dir.y) return;
    nextDir = { x: dx, y: dy };
  }

  function step() {
    dir = nextDir;
    var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver(); return;
    }

    // Self collision
    if (snake.some(function(s) { return s.x === head.x && s.y === head.y; })) {
      gameOver(); return;
    }

    snake.unshift(head);

    // Food eaten
    if (head.x === food.x && head.y === food.y) {
      score++;
      updateScore();
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#050f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = 'rgba(0,198,255,0.04)';
    for (var x = 0; x < COLS; x++) {
      for (var y = 0; y < ROWS; y++) {
        ctx.fillRect(x * GRID + 9, y * GRID + 9, 2, 2);
      }
    }

    // Food
    ctx.fillStyle = '#ff4444';
    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur  = 10;
    ctx.beginPath();
    ctx.arc(
      food.x * GRID + GRID/2,
      food.y * GRID + GRID/2,
      GRID/2 - 3, 0, Math.PI * 2
    );
    ctx.fill();
    ctx.shadowBlur = 0;

    // Snake body
    snake.forEach(function(seg, i) {
      if (i === 0) {
        // Head — brighter
        ctx.fillStyle = '#00ffd5';
        ctx.shadowColor = '#00ffd5';
        ctx.shadowBlur  = 12;
      } else {
        var alpha = 1 - (i / snake.length) * 0.5;
        ctx.fillStyle = 'rgba(0,198,255,' + alpha + ')';
        ctx.shadowBlur = 0;
      }
      var margin = i === 0 ? 1 : 2;
      ctx.beginPath();
      ctx.roundRect(
        seg.x * GRID + margin,
        seg.y * GRID + margin,
        GRID - margin * 2,
        GRID - margin * 2,
        4
      );
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  function gameOver() {
    clearInterval(gameLoop);
    running = false;
    if (score > bestScore) {
      bestScore = score;
      document.getElementById('best').innerText = bestScore;
    }
    document.getElementById('statusMsg').innerText = '💀 Game Over! Score: ' + score;
    document.getElementById('statusMsg').style.color = '#ff6b6b';
    document.getElementById('startBtn').innerText = '🔄 Play Again';

    // Draw game over overlay
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 28px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 16);
    ctx.fillStyle = '#fff';
    ctx.font = '16px Exo 2, sans-serif';
    ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 18);
  }

  function updateScore() {
    document.getElementById('score').innerText = score;
    if (score > bestScore) {
      bestScore = score;
      document.getElementById('best').innerText = bestScore;
    }
  }

  // Draw idle screen
  function drawIdle() {
    ctx.fillStyle = '#050f1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(0,198,255,0.5)';
    ctx.font = 'bold 22px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('SNAKE', canvas.width/2, canvas.height/2 - 10);
    ctx.fillStyle = '#888';
    ctx.font = '14px Exo 2, sans-serif';
    ctx.fillText('Start dabao khel ne ke liye', canvas.width/2, canvas.height/2 + 20);
  }
  drawIdle();

  // Keyboard controls
  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowUp':    case 'w': case 'W': setDir(0, -1); e.preventDefault(); break;
      case 'ArrowDown':  case 's': case 'S': setDir(0,  1); e.preventDefault(); break;
      case 'ArrowLeft':  case 'a': case 'A': setDir(-1, 0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': setDir( 1, 0); e.preventDefault(); break;
    }
  });

  // Touch/swipe controls
  var touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    e.preventDefault();
  }, { passive: false });
</script>
</body>
          </html>
