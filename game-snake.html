<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game | Rock Tools</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-wrap  { max-width:480px; margin:30px auto; padding:0 16px 60px; text-align:center; }
    .game-title { font-family:'Orbitron',sans-serif; color:#00c6ff; font-size:1.6rem; margin-bottom:4px; }
    .game-hint  { font-size:12px; color:#555; margin-bottom:10px; }
    .score-bar  { display:flex; justify-content:center; gap:20px; margin:12px 0; }
    .score-box  { background:rgba(255,255,255,0.04); border:1px solid rgba(0,198,255,0.2); border-radius:10px; padding:7px 22px; }
    .score-label{ font-size:11px; color:#666; text-transform:uppercase; letter-spacing:1px; }
    .score-val  { font-size:22px; font-weight:700; color:#00c6ff; }
    .canvas-wrap{ position:relative; display:inline-block; }
    canvas      { display:block; border-radius:14px; background:#0d1f0d; }
    .canvas-wrap::after {
      content:''; position:absolute; inset:0; border-radius:14px;
      border:2px dashed rgba(80,200,80,0.18); pointer-events:none;
    }
    .game-btn {
      background:linear-gradient(135deg,#00c6ff,#0072ff);
      border:none; border-radius:10px; color:#000; font-weight:700;
      font-size:15px; padding:11px 34px; cursor:pointer; margin-top:14px;
      font-family:'Exo 2',sans-serif;
    }
    .game-btn:hover { opacity:0.85; }
    .dpad { display:none; flex-direction:column; align-items:center; gap:4px; margin-top:14px; }
    .dpad-row { display:flex; gap:4px; }
    .dpad-btn {
      width:60px; height:60px;
      background:rgba(0,180,0,0.1); border:1px solid rgba(0,200,0,0.3);
      border-radius:12px; color:#4ade80; font-size:24px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; user-select:none;
    }
    .dpad-btn:active { background:rgba(0,200,0,0.25); }
    @media(max-width:500px){
      canvas { width:320px !important; height:320px !important; }
      .dpad  { display:flex; }
    }
    .back-link { display:inline-block; margin-top:20px; color:#666; font-size:13px; text-decoration:none; }
    .back-link:hover { color:#00c6ff; }
    @keyframes snake_slither {
      0%,100% { transform:rotate(-1.5deg); }
      50%     { transform:rotate( 1.5deg); }
    }
    @keyframes tongue_flicker {
      0%,100% { opacity:1;   transform:scaleX(1);   }
      45%     { opacity:0.3; transform:scaleX(0.5); }
      65%     { opacity:1;   transform:scaleX(1.3); }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Rock Tools Logo">
      <span class="logo-text">ROCK TOOLS</span>
    </a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="tools.html">Tools</a></li>

  <div class="game-wrap">
    <h1 class="game-title">🐍 Snake</h1>
    <p class="game-hint">Arrow keys / WASD — Border se niklo opposite side se aao!</p>
    <div class="score-bar">
      <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score">0</div></div>
      <div class="score-box"><div class="score-label">Best</div><div class="score-val"  id="best">0</div></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>
    <button class="game-btn" id="startBtn" onclick="startGame()">▶ Start Game</button>
    <div class="dpad" id="dpad">
      <div class="dpad-row"><div class="dpad-btn" onclick="setDir(0,-1)">▲</div></div>
      <div class="dpad-row">
        <div class="dpad-btn" onclick="setDir(-1,0)">◀</div>
        <div class="dpad-btn" onclick="setDir(0, 1)">▼</div>
        <div class="dpad-btn" onclick="setDir( 1,0)">▶</div>
      </div>
    </div>
    <a href="games.html" class="back-link">← Back to Games</a>
  </div>

<script>
// ══════════════════════════════════════════════
//  ROCK TOOLS — Snake Game
//  Animation: snake_slither
//  Function:  moveSerpentine()
//  Description: Snake moves in smooth S-shaped wave motion
//  Bug Fix: Direction change pe body straight nahi hogi
//  Updated: 22 March 2026
// ══════════════════════════════════════════════

var canvas = document.getElementById('gameCanvas');
var ctx    = canvas.getContext('2d');
var GRID   = 20;
var COLS   = canvas.width  / GRID;
var ROWS   = canvas.height / GRID;
var HALF   = GRID / 2;

// Wave parameters
var WAVE_FREQ  = 0.55;  // S-shape frequency per segment
var WAVE_AMP   = 11;    // Wave amplitude
var WAVE_SPEED = 3.5;   // Wave travel speed
var MOVE_SPEED = 155;   // ms per grid step

var snake, dir, nextDir, food, score, bestScore;
var animFrame, moveInterval, lastTime, interpFactor;

// ── Trail: stores head's visual position history ──
// Body segments follow this trail — no global direction used for body
var trail = [];
var TRAIL_SPACING = GRID + 2; // pixels between body segments in trail

bestScore = 0;

function gx(s){ return s.x * GRID + HALF; }
function gy(s){ return s.y * GRID + HALF; }
function isWrapped(a,b){ return Math.abs(a.x-b.x)>2 || Math.abs(a.y-b.y)>2; }

// ── moveSerpentine() ──
// Description: Snake moves in smooth S-shaped wave motion
// FIX: Uses LOCAL tangent direction per segment — not global dir
// So direction changes don't snap the body straight
function moveSerpentine(baseX, baseY, time, localDirX, localDirY){
  // Perpendicular to LOCAL movement direction of this segment
  var len = Math.sqrt(localDirX*localDirX + localDirY*localDirY) || 1;
  var ndx = localDirX/len, ndy = localDirY/len; // normalized
  var px  = -ndy; // perpendicular
  var py  =  ndx;

  // Wave based on position along the body (not segment index)
  // This way turning doesn't affect body wave phase
  var distAlongPath = baseX * 0.04 + baseY * 0.04; // position-based phase
  var wave = Math.sin(distAlongPath + time * WAVE_SPEED) * WAVE_AMP;

  return { x: baseX + px*wave, y: baseY + py*wave };
}

function startGame(){
  snake = [
    {x:14,y:10},{x:13,y:10},{x:12,y:10},{x:11,y:10},
    {x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}
  ];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; interpFactor = 0; trail = [];

  // Pre-fill trail with initial positions
  for(var i=0; i<snake.length; i++){
    for(var t=0; t<TRAIL_SPACING; t++){
      trail.push({x:gx(snake[i]), y:gy(snake[i])});
    }
  }

  updateScore(); spawnFood();
  document.getElementById('startBtn').innerText = '🔄 Restart';
  if(window.innerWidth<=500) document.getElementById('dpad').style.display='flex';

  cancelAnimationFrame(animFrame); clearInterval(moveInterval); lastTime=null;
  moveInterval = setInterval(step, MOVE_SPEED);

  function renderLoop(ts){
    if(lastTime===null) lastTime=ts;
    var dt=ts-lastTime; lastTime=ts;
    interpFactor = Math.min(interpFactor + dt/MOVE_SPEED, 1);
    draw(ts);
    animFrame = requestAnimationFrame(renderLoop);
  }
  animFrame = requestAnimationFrame(renderLoop);
}

function spawnFood(){
  var pos;
  do{ pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(function(s){return s.x===pos.x&&s.y===pos.y;}));
  food=pos;
}

function setDir(dx,dy){
  if(dx===-dir.x&&dy===-dir.y) return;
  nextDir={x:dx,y:dy};
}

function step(){
  dir=nextDir;
  var head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  // Nokia wrap
  if(head.x<0)     head.x=COLS-1;
  if(head.x>=COLS) head.x=0;
  if(head.y<0)     head.y=ROWS-1;
  if(head.y>=ROWS) head.y=0;
  // Self collision (grid-based)
  var body=snake.slice(0,snake.length-1);
  if(body.some(function(s){return s.x===head.x&&s.y===head.y;})){
    gameOver(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){ score++; updateScore(); spawnFood(); }
  else snake.pop();
  interpFactor=0;
}

// ── Interpolated head base position ──
function getHeadBase(){
  var cur=snake[0], prev=snake[1];
  if(!prev||isWrapped(cur,prev)) return {x:gx(cur),y:gy(cur)};
  return {
    x: gx(prev)+(gx(cur)-gx(prev))*interpFactor,
    y: gy(prev)+(gy(cur)-gy(prev))*interpFactor
  };
}

// ════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════
function draw(ts){
  var time=ts/1000;
  ctx.fillStyle='#0d1f0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid
  ctx.strokeStyle='rgba(0,70,0,0.15)'; ctx.lineWidth=0.5;
  for(var i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,canvas.height);ctx.stroke();}
  for(var j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*GRID);ctx.lineTo(canvas.width,j*GRID);ctx.stroke();}

  drawFood();

  if(snake&&snake.length>0){
    var hBase = getHeadBase();

    // ── Head S-wave using current direction ──
    var headWave = moveSerpentine(hBase.x, hBase.y, time, dir.x, dir.y);

    // Push to trail front
    trail.unshift({x:headWave.x, y:headWave.y});
    var maxLen = snake.length * TRAIL_SPACING + 100;
    if(trail.length > maxLen) trail.length = maxLen;

    drawBody(time);
    drawHead(headWave, time);
  }
}

function drawFood(){
  var x=food.x*GRID+HALF, y=food.y*GRID+HALF, r=HALF-2;
  ctx.shadowColor='#ff2222'; ctx.shadowBlur=14;
  var g=ctx.createRadialGradient(x-3,y-3,1,x,y,r);
  g.addColorStop(0,'#ff6666'); g.addColorStop(0.5,'#dd2222'); g.addColorStop(1,'#881111');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,180,180,0.4)';
  ctx.beginPath(); ctx.ellipse(x-3,y-3,r/2,r/3,-0.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=1.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y-r); ctx.quadraticCurveTo(x+4,y-r-5,x+2,y-r-7); ctx.stroke();
  ctx.fillStyle='#2a8a2a';
  ctx.beginPath(); ctx.ellipse(x+4,y-r-4,4,2,0.8,0,Math.PI*2); ctx.fill();
}

// ── Body: each segment follows trail ──
// Trail = head ka actual path history
// Body straight nahi hogi kyunki trail mein purani curves stored hain
function drawBody(time){
  if(snake.length<2 || trail.length<4) return;

  // Get body points from trail
  var bodyPts=[];
  for(var i=0; i<snake.length; i++){
    var idx = i * TRAIL_SPACING;
    if(idx >= trail.length) idx = trail.length-1;
    bodyPts.push({x:trail[idx].x, y:trail[idx].y});
  }

  // 1. Shadow
  ctx.save();
  ctx.strokeStyle='rgba(0,15,0,0.55)';
  ctx.lineWidth=GRID; ctx.lineCap='round'; ctx.lineJoin='round';
  drawCurve(bodyPts);
  ctx.restore();

  // 2. Body with gradient + taper
  for(var s=0; s<bodyPts.length-1; s++){
    var p1=bodyPts[s], p2=bodyPts[s+1];
    var prog = s/(bodyPts.length-1);
    var wf   = 1 - prog*prog*0.72;
    var sw   = Math.max(2, (GRID-2)*wf);

    var g=ctx.createLinearGradient(p1.x,p1.y,p2.x,p2.y);
    if(prog<0.2){       g.addColorStop(0,'#a8cc30'); g.addColorStop(1,'#80aa20'); }
    else if(prog<0.55){ g.addColorStop(0,'#80aa20'); g.addColorStop(1,'#508018'); }
    else {              g.addColorStop(0,'#508018'); g.addColorStop(1,'#2c5008'); }

    ctx.strokeStyle=g; ctx.lineWidth=sw; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }

  // 3. Belly stripe
  ctx.save();
  ctx.strokeStyle='rgba(210,225,80,0.15)'; ctx.lineWidth=2.5;
  ctx.lineCap='round'; ctx.lineJoin='round';
  drawCurve(bodyPts);
  ctx.restore();

  // 4. Scale marks — perpendicular to LOCAL body direction
  for(var s=1; s<bodyPts.length-1; s++){
    var mp=bodyPts[s];
    var dx=bodyPts[s-1].x-bodyPts[s+1].x;
    var dy=bodyPts[s-1].y-bodyPts[s+1].y;
    var len=Math.sqrt(dx*dx+dy*dy)||1;
    var prog=s/(bodyPts.length-1);
    var hw2=Math.max(2,(HALF-2)*(1-prog*0.65));
    var nx=-dy/len*hw2, ny=dx/len*hw2;
    ctx.strokeStyle='rgba(0,40,0,0.42)'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(mp.x+nx,mp.y+ny); ctx.lineTo(mp.x-nx,mp.y-ny); ctx.stroke();
    ctx.fillStyle=s%2===0?'rgba(140,200,40,0.22)':'rgba(90,155,20,0.16)';
    ctx.beginPath(); ctx.arc(mp.x,mp.y,2,0,Math.PI*2); ctx.fill();
  }
}

// Smooth bezier path
function drawCurve(pts){
  if(pts.length<2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++){
    if(i<pts.length-1){
      var mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    } else { ctx.lineTo(pts[i].x,pts[i].y); }
  }
  ctx.stroke();
}

// ── Head ──
function drawHead(hv, time){
  ctx.save();
  ctx.translate(hv.x, hv.y);

  // Head angle from trail (actual path direction)
  var angle = Math.atan2(dir.y, dir.x);
  if(trail.length>6){
    var dx=trail[0].x-trail[6].x, dy=trail[0].y-trail[6].y;
    if(Math.abs(dx)+Math.abs(dy)>0.5) angle=Math.atan2(dy,dx);
  }
  ctx.rotate(angle);

  var hw=HALF+3, hh=HALF-1;

  ctx.shadowColor='rgba(0,0,0,0.55)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;
  var hg=ctx.createLinearGradient(-hw,-hh,hw,hh);
  hg.addColorStop(0,'#b8d840'); hg.addColorStop(0.4,'#82b032'); hg.addColorStop(1,'#426820');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.ellipse(1,0,hw,hh,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;

  // Yellow stripe
  ctx.fillStyle='rgba(200,222,60,0.42)';
  ctx.beginPath(); ctx.ellipse(-1,-2,hw-3,hh-5,0,0,Math.PI*2); ctx.fill();

  // Scale lines
  ctx.strokeStyle='rgba(0,50,0,0.35)'; ctx.lineWidth=0.8;
  for(var si=-2;si<=2;si++){ ctx.beginPath(); ctx.arc(si*4,0,5,-Math.PI*0.5,Math.PI*0.5); ctx.stroke(); }

  // Jaws
  ctx.fillStyle='#c8a060';
  ctx.beginPath(); ctx.ellipse(hw+1,-2.5,5,2.5,-0.25,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hw+1, 2.5,5,2.5, 0.25,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7a1818';
  ctx.beginPath();
  ctx.moveTo(hw-2,-3); ctx.quadraticCurveTo(hw+6,0,hw-2,3);
  ctx.quadraticCurveTo(hw+2,0,hw-2,-3); ctx.fill();
  ctx.fillStyle='rgba(220,120,120,0.45)';
  ctx.beginPath(); ctx.ellipse(hw+2,0,4,2,0,0,Math.PI*2); ctx.fill();

  // Fangs
  ctx.fillStyle='#f5f5f5';
  ctx.beginPath(); ctx.moveTo(hw,-1.5); ctx.lineTo(hw+5,0.5); ctx.lineTo(hw,1); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(hw,1.5);  ctx.lineTo(hw+5,-0.5); ctx.lineTo(hw,-1); ctx.closePath(); ctx.fill();

  // Tongue (flickers)
  var ts2=0.6+Math.abs(Math.sin(time*6))*0.7;
  ctx.save(); ctx.translate(hw+3,0); ctx.scale(ts2,1);
  ctx.strokeStyle='#cc0000'; ctx.lineWidth=1.6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(5,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,0); ctx.quadraticCurveTo(7,-1,9,-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,0); ctx.quadraticCurveTo(7, 1,9, 3); ctx.stroke();
  ctx.restore();

  // Eyes
  drawEye(3,-(hh-2)); drawEye(3,hh-2);

  // Nostrils
  ctx.fillStyle='#1a5010';
  ctx.beginPath(); ctx.arc(hw-1,-3,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(hw-1, 3,1.2,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawEye(ex,ey){
  ctx.fillStyle='#c8a020'; ctx.beginPath(); ctx.arc(ex,ey,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(ex,ey,1.2,2.8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(ex+1,ey-1,1,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#111'; ctx.lineWidth=0.7; ctx.beginPath(); ctx.arc(ex,ey,3.5,0,Math.PI*2); ctx.stroke();
}

function gameOver(){
  clearInterval(moveInterval); cancelAnimationFrame(animFrame);
  if(score>bestScore){ bestScore=score; document.getElementById('best').innerText=bestScore; }
  document.getElementById('startBtn').innerText='🔄 Play Again';
  draw(performance.now());
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center';
  ctx.fillStyle='#ff4444'; ctx.font='bold 26px Orbitron,sans-serif';
  ctx.fillText('GAME OVER',canvas.width/2,canvas.height/2-20);
  ctx.fillStyle='#fff'; ctx.font='16px Exo 2,sans-serif';
  ctx.fillText('Score: '+score,canvas.width/2,canvas.height/2+14);
  ctx.fillStyle='#888'; ctx.font='13px Exo 2,sans-serif';
  ctx.fillText('Play Again dabao',canvas.width/2,canvas.height/2+40);
}

function updateScore(){
  document.getElementById('score').innerText=score;
  if(score>bestScore){ bestScore=score; document.getElementById('best').innerText=bestScore; }
}

function drawIdle(){
  ctx.fillStyle='#0d1f0d'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,70,0,0.15)'; ctx.lineWidth=0.5;
  for(var i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,canvas.height);ctx.stroke();}
  for(var j=0;j<=ROWS;j++){ctx.beginPath();ctx.moveTo(0,j*GRID);ctx.lineTo(canvas.width,j*GRID);ctx.stroke();}
  ctx.textAlign='center';
  ctx.fillStyle='rgba(100,180,40,0.5)'; ctx.font='52px sans-serif';
  ctx.fillText('🐍',canvas.width/2,canvas.height/2+18);
}
drawIdle();

document.addEventListener('keydown',function(e){
  switch(e.key){
    case'ArrowUp':   case'w':case'W': setDir(0,-1);e.preventDefault();break;
    case'ArrowDown': case's':case'S': setDir(0, 1);e.preventDefault();break;
    case'ArrowLeft': case'a':case'A': setDir(-1,0);e.preventDefault();break;
    case'ArrowRight':case'd':case'D': setDir( 1,0);e.preventDefault();break;
  }
});

var tx=0,ty=0;
canvas.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0);
  else setDir(0,dy>0?1:-1);
  e.preventDefault();
},{passive:false});
</script>
</body>
