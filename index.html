<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Tools - Merger, Image to PDF, PDF to Word</title>
    <link rel="stylesheet" href="style.css">
    <!-- PDF Lib Library -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- PDF.js for PDF viewing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
    <div class="container">
        <h1>📄 PDF Tools</h1>
        
        <!-- PDF Merger Section -->
        <div class="tool-section">
            <h2>🔗 PDF Merger</h2>
            <p>Do ya zyada PDFs ko ek karne ke liye:</p>
            <input type="file" id="mergeFiles" multiple accept=".pdf">
            <button onclick="mergePDFs()">Merge PDFs</button>
        </div>

        <!-- Image to PDF Section -->
        <div class="tool-section">
            <h2>🖼️ Image to PDF</h2>
            <p>Images ko PDF mein convert karein:</p>
            <input type="file" id="imageFiles" multiple accept="image/*">
            <button onclick="convertImageToPDF()">Convert to PDF</button>
        </div>

        <!-- PDF to Word Section -->
        <div class="tool-section">
            <h2>📝 PDF to Word</h2>
            <p>PDF ko Word document mein convert karein:</p>
            <input type="file" id="pdfToWordFile" accept=".pdf">
            <button onclick="convertPDFToWord()">Convert to Word</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
