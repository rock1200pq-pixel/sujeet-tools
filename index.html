<!DOCTYPE html>
<html>
<head>
    <title>Rock Tools - Free Online Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
        }
        h1{
            background:#007bff;
            color:white;
            padding:15px;
        }
        .box{
            background:white;
            padding:20px;
            margin:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        button{
            padding:10px 20px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
        input{
            margin:10px;
        }
        footer{
            margin-top:30px;
            padding:15px;
            background:#222;
            color:white;
        }
    </style>
</head>
<body>

<h1>🚀 Rock Free Online Tools</h1>

<div class="box">
    <h2>📄 PDF Merge Tool (Demo)</h2>
    <input type="file" multiple>
    <br>
    <button onclick="alert('PDF Merge Feature Coming Soon!')">Merge PDF</button>
</div>

<div class="box">
   <script>
async function convertToPDF() {
    const { jsPDF } = window.jspdf;
    const fileInput = document.getElementById('imageInput');
    
    if (fileInput.files.length === 0) {
        alert("Please select an image first!");
        return;
    }

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;

        img.onload = function() {
            const pdf = new jsPDF({
                orientation: img.width > img.height ? "landscape" : "portrait",
                unit: "px",
                format: [img.width, img.height]
            });

            pdf.addImage(img, 'JPEG', 0, 0, img.width, img.height);
            pdf.save("converted.pdf");
        }
    };

    reader.readAsDataURL(file);
}
</script> 
</div>

<footer>
    © 2026 Rock Tools | Made in India 🇮🇳
</footer>

</body>
</html>
